<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }
    .card {
      background: #222;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>📊 Leads</h1>
<div id="leads"></div>

<script>
async function loadLeads() {
  const res = await fetch("https://construction-website-ey39.onrender.com/leads");
  const data = await res.json();

  const container = document.getElementById("leads");

  data.forEach(lead => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <h3>${lead.name}</h3>
      <p>📞 ${lead.phone}</p>
      <p>${lead.message}</p>
    `;
    container.appendChild(div);
  });
}

loadLeads();
</script>

</body>
</html>
