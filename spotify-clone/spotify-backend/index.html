<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Player</title>

  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .search-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
    }

    input {
      width: 60%;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      background: #1db954;
      color: white;
      cursor: pointer;
    }

    #results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #181818;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card h3 {
      font-size: 14px;
      margin: 5px 0;
    }

    .card p {
      font-size: 12px;
      color: #aaa;
    }

    .card button {
      margin-top: 5px;
      width: 100%;
      font-size: 12px;
    }

    #player {
      margin-bottom: 80px;
    }
  </style>
</head>

<body>

  <header>🎧 My Player</header>

  <div class="search-bar">
    <input id="searchInput" placeholder="Search songs..." />
    <button id="searchBtn">Search</button>
  </div>

  <div id="results"></div>

  <!-- 🔥 PLAYER (bottom dynamic) -->
  <div id="player"></div>

  <script src="script.js"></script>

</body>
</html>
